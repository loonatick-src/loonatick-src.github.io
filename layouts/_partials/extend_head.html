<style>
/* Sticky right-sidebar ToC on wide viewports.
   Article is centered with max-width var(--main-width) (720px). We park the
   ToC in the right gutter via fixed positioning, keyed off viewport width. */
@media (min-width: 1280px) {
    .post-single details.toc {
        position: fixed;
        top: 6rem;
        left: calc(50% + var(--main-width) / 2 + var(--gap));
        width: calc((100vw - var(--main-width)) / 2 - var(--gap) * 3);
        max-width: 22rem;
        max-height: calc(100vh - 8rem);
        overflow-y: auto;
        margin: 0;
        padding: 0.6rem 1rem;
        background: var(--code-bg);
        z-index: 10;
    }

    .post-single details.toc .inner {
        margin: 0;
    }
}

/* Scroll-margin so anchor jumps don't hide under the page header. */
.post-content :is(h1, h2, h3, h4, h5, h6) {
    scroll-margin-top: 5rem;
}
</style>
